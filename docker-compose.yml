version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: swiftqueue-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: swiftqueue-server
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - redis
    restart: unless-stopped

  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - redis
      - server
    restart: unless-stopped

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: swiftqueue-dashboard
    ports:
      - "5173:5173"
    depends_on:
      - server
    restart: unless-stopped
